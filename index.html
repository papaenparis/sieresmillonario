<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Si Eres Millonario</title>
  <meta name="description" content="Accede a mis redes sociales y grupo VIP exclusivo">
  <meta property="og:title" content="Si Eres Millonario">
  <meta property="og:description" content="Accede a mis redes sociales y grupo VIP exclusivo">
  <meta property="og:image" content="https://sieresmillonario.com/profile.jpg">
  <meta property="og:url" content="https://sieresmillonario.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #08060f;
      --bg-mid: #110d1f;
      --gold: #d4a54a;
      --gold-light: #f0d48a;
      --gold-bright: #ffe5a0;
      --gold-dark: #9e7a2e;
      --text-primary: #f5f0e8;
      --text-secondary: rgba(245, 240, 232, 0.65);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(212, 165, 74, 0.15);
      --glass-hover: rgba(212, 165, 74, 0.08);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* === ANIMATED BACKGROUND === */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 0%, #1a1030 0%, var(--bg-deep) 70%);
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #0d0a18 0%, #14102a 30%, #1a0f2e 50%, #110d1f 70%, #08060f 100%);
      background-size: 300% 300%;
      animation: gradientShift 20s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 50% 0%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 100%; }
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: orbFloat 20s ease-in-out infinite;
      will-change: transform;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(212, 165, 74, 0.25), transparent 70%);
      top: -10%;
      right: -10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(160, 100, 200, 0.15), transparent 70%);
      bottom: 10%;
      left: -15%;
      animation-delay: -7s;
      animation-duration: 25s;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(212, 165, 74, 0.15), transparent 70%);
      top: 50%;
      left: 60%;
      animation-delay: -14s;
      animation-duration: 18s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      25% { transform: translate3d(30px, -40px, 0) scale(1.05); }
      50% { transform: translate3d(-20px, 20px, 0) scale(0.95); }
      75% { transform: translate3d(40px, 15px, 0) scale(1.02); }
    }

    /* Gold dust particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* === MAIN CONTENT === */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 24px 40px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* === PROFILE SECTION === */
    .profile-wrapper {
      position: relative;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .profile-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--gold), var(--gold-light), var(--gold-dark), var(--gold), var(--gold-light), var(--gold));
      animation: ringRotate 6s linear infinite;
      opacity: 0.8;
    }

    .profile-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg-deep);
    }

    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }

    .profile-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 165, 74, 0.2), transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .profile-photo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 20%;
      position: relative;
      z-index: 2;
      border: 3px solid var(--bg-deep);
    }

    /* === NAME & BIO === */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 40%, var(--gold-light) 60%, var(--gold) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmerText 4s ease-in-out infinite, fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      opacity: 0;
    }

    @keyframes shimmerText {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 200% center; }
    }

    .crown {
      display: inline-block;
      font-size: 22px;
      margin-right: 4px;
      filter: drop-shadow(0 0 8px rgba(212, 165, 74, 0.5));
    }

    .tagline {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
    }

    /* === DIVIDER === */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.65s forwards;
    }

    /* === LINK CARDS === */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text-primary);
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(20px);
    }

    .link-card:nth-child(1) { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards; }
    .link-card:nth-child(2) { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards; }
    .link-card:nth-child(3) { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.0s forwards; }
    .link-card:nth-child(4) { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.15s forwards; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212, 165, 74, 0.06), transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .link-card:hover, .link-card:active {
      border-color: rgba(212, 165, 74, 0.35);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(212, 165, 74, 0.12), 0 0 0 1px rgba(212, 165, 74, 0.08);
    }

    .link-card:hover::before, .link-card:active::before {
      opacity: 1;
    }

    /* === FEATURED CARD (Telegram VIP) === */
    .link-card.featured {
      background: linear-gradient(135deg, rgba(212, 165, 74, 0.08), rgba(212, 165, 74, 0.03));
      border-color: rgba(212, 165, 74, 0.3);
      padding: 22px;
    }

    .link-card.featured::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(212, 165, 74, 0.3), rgba(212, 165, 74, 0.05), rgba(212, 165, 74, 0.2));
      z-index: -1;
      opacity: 0;
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .link-card.featured:hover {
      box-shadow: 0 8px 40px rgba(212, 165, 74, 0.2), 0 0 60px rgba(212, 165, 74, 0.08);
    }

    /* Shimmer sweep on featured card */
    .link-card.featured .shimmer-sweep {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.04), transparent);
      animation: sweep 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }

    /* VIP badge */
    .vip-badge {
      position: absolute;
      top: -1px;
      right: 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-deep);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px 5px;
      border-radius: 0 0 8px 8px;
    }

    /* === ICON STYLES === */
    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
    }

    .link-icon.telegram {
      background: linear-gradient(135deg, rgba(0, 136, 204, 0.2), rgba(0, 136, 204, 0.1));
      border: 1px solid rgba(0, 136, 204, 0.25);
    }

    .link-icon.telegram svg { fill: #0088cc; }

    .link-icon.instagram {
      background: linear-gradient(135deg, rgba(225, 48, 108, 0.2), rgba(131, 58, 180, 0.1));
      border: 1px solid rgba(225, 48, 108, 0.25);
    }

    .link-icon.instagram svg { fill: url(#ig-gradient); }

    .link-icon.tiktok {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .link-icon.tiktok svg { fill: #fff; }

    /* === LINK TEXT === */
    .link-content {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .link-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }

    .link-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
      font-weight: 300;
    }

    .link-card.featured .link-title {
      font-size: 16px;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Arrow icon */
    .link-arrow {
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: transform 0.3s ease, color 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .link-card:hover .link-arrow {
      transform: translateX(4px);
      color: var(--gold);
    }

    .link-arrow svg {
      width: 18px;
      height: 18px;
    }

    /* === FOOTER === */
    .footer {
      margin-top: auto;
      padding-top: 50px;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 0.6s ease 1.4s forwards;
    }

    .footer-line {
      width: 30px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 165, 74, 0.3), transparent);
      margin: 0 auto 16px;
    }

    .footer-text {
      font-size: 11px;
      color: rgba(245, 240, 232, 0.25);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* === MOBILE TOUCH STATES === */
    @media (pointer: coarse) {
      .link-card:hover {
        transform: none;
        box-shadow: none;
        border-color: var(--glass-border);
      }

      .link-card:hover::before {
        opacity: 0;
      }

      .link-card:hover .link-arrow {
        transform: none;
        color: var(--text-secondary);
      }

      .link-card:active {
        transform: scale(0.98);
        border-color: rgba(212, 165, 74, 0.35);
        background: var(--glass-hover);
      }

      .link-card.featured:hover {
        box-shadow: none;
      }

      .link-card.featured:active {
        box-shadow: 0 4px 20px rgba(212, 165, 74, 0.15);
      }
    }

    /* Small screens */
    @media (max-width: 380px) {
      .container {
        padding: 40px 18px 30px;
      }

      .name {
        font-size: 24px;
      }

      .link-card {
        padding: 16px 18px;
      }
    }

    /* Tall screens - center content */
    @media (min-height: 800px) {
      .container {
        justify-content: center;
        padding-top: 0;
      }

      .profile-wrapper {
        margin-top: -40px;
      }
    }

    /* Prefers reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

      .particle {
        display: none;
      }
    }
  </style>
</head>

  <script>
    // Gold particle system
    (function() {
      const container = document.getElementById('particles');
      const count = window.innerWidth < 600 ? 15 : 25;
      const styleSheet = document.createElement('style');
      let css = '';

      for (let i = 0; i < count; i++) {
        const drift = (Math.random() - 0.5) * 80;
        const sway = (Math.random() - 0.5) * 30;
        css += `
          @keyframes pr${i} {
            0% { transform: translate3d(0, 0, 0); opacity: 0; }
            5% { opacity: 1; }
            50% { transform: translate3d(${sway}px, -55vh, 0); opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translate3d(${drift}px, -110vh, 0); opacity: 0; }
          }
        `;
      }

      styleSheet.textContent = css;
      document.head.appendChild(styleSheet);

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';

        const size = Math.random() * 3 + 1.5;
        const x = Math.random() * 100;
        const duration = Math.random() * 12 + 8;
        const delay = Math.random() * duration;
        const isGold = Math.random() > 0.3;

        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${x}%;
          bottom: -10px;
          background: ${isGold
            ? `rgba(212, 165, 74, ${Math.random() * 0.5 + 0.3})`
            : `rgba(255, 255, 255, ${Math.random() * 0.2 + 0.1})`};
          box-shadow: 0 0 ${size * 2}px ${isGold
            ? `rgba(212, 165, 74, 0.3)`
            : `rgba(255, 255, 255, 0.1)`};
          animation: pr${i} ${duration}s linear ${delay}s infinite;
        `;

        p.addEventListener('animationiteration', () => {
          p.style.left = Math.random() * 100 + '%';
        });

        container.appendChild(p);
      }
    })();
  </script>
